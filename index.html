  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: hsl(43,25%,97%);
      color: hsl(20,10%,8%);
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }
    a, button, [role="button"], input, textarea, select, label { cursor: none; }

    :root {
      --primary: hsl(43,67%,44%);
      --primary-rgb: 190,152,67;
      --bg: hsl(43,25%,97%);
      --fg: hsl(20,10%,8%);
      --border: hsl(43,25%,84%);
      --card: hsl(43,20%,94%);
      --muted: hsl(210,8%,42%);

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(var(--primary-rgb),.4); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(var(--primary-rgb),.7); }
    ::selection { background: rgba(var(--primary-rgb),.3); color: inherit; }

    /* Custom cursor */
    .cursor-dot {
      position: fixed; width: 7px; height: 7px;
      background: var(--primary); border-radius: 50%;
      pointer-events: none; z-index: 99999;
      top: 0; left: 0; margin-top: -3.5px; margin-left: -3.5px;
      will-change: transform;
    }
    .cursor-ring {
      position: fixed; width: 38px; height: 38px;
      border: 1px solid rgba(var(--primary-rgb),.55); border-radius: 50%;
      pointer-events: none; z-index: 99998;
      top: 0; left: 0; margin-top: -19px; margin-left: -19px;
      will-change: transform;
      transition: width .35s cubic-bezier(.25,1,.5,1), height .35s cubic-bezier(.25,1,.5,1),
                  margin .35s cubic-bezier(.25,1,.5,1), background .35s ease, border-color .35s ease, opacity .3s ease;
    }
    .cursor-ring.cursor-hover { width:60px; height:60px; margin-top:-30px; margin-left:-30px; background:rgba(var(--primary-rgb),.08); border-color:rgba(var(--primary-rgb),.8); }
    .cursor-ring.cursor-hidden, .cursor-dot.cursor-hidden { opacity: 0; }

    /* Marquee */
    @keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .marquee-track { display:flex; width:max-content; animation:marquee 28s linear infinite; }
    .marquee-track:hover { animation-play-state:paused; }

    /* Scroll progress */
    .scroll-progress {
      position: fixed; top: 0; left: 0; height: 2px;
      background: var(--primary); z-index: 9999; transform-origin: left;
    }

    /* No-scrollbar */
    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

    /* Section utility */
    .section-label {
      font-size: 10px; letter-spacing: .4em; text-transform: uppercase;
      color: var(--muted); display: flex; align-items: center; gap: 12px;
    }
    .section-label::before { content:''; display:inline-block; width:32px; height:.5px; background:rgba(var(--primary-rgb),.6); }
    .display-heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; line-height: 1;
    }

    /* Buttons */
    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border: 1px solid rgba(255,255,255,.4);
      color: #fff; font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
      text-decoration: none; transition: background .4s, color .4s;
    }
    .btn-outline:hover { background: #fff; color: #000; }
    .btn-gold {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; background: var(--primary);
      color: #000; font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
      text-decoration: none; border: none; transition: background .4s;
    }
    .btn-gold:hover { background: #fff; }

    /* Form inputs */
    .form-input {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid rgba(255,255,255,.15);
      padding: 12px 0; color: #fff; font-family: 'DM Sans',sans-serif;
      font-size: 14px; font-weight: 300;
      outline: none; transition: border-color .3s;
    }
    .form-input::placeholder { color: rgba(255,255,255,.25); }
    .form-input:focus { border-bottom-color: var(--primary); }
    .form-label {
      display: block; font-size: 9px; letter-spacing: .3em;
      text-transform: uppercase; color: rgba(255,255,255,.35);
      font-family: 'DM Sans',sans-serif; margin-bottom: 8px;
    }

    /* Lightbox overlay */
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,.97);
      display: flex; align-items: center; justify-content: center;
    }

    /* Misc */
    img { display: block; max-width: 100%; }
    * { border-color: var(--border); }
  </style>
</head>
<body>

  <script type="text/babel" data-type="module" data-presets="react">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { motion, AnimatePresence, useInView } from 'framer-motion';

    /* ─── IMAGE URLS ─────────────────────────────────────────────── */
    const IMG = {

      bali:        'https://images.squarespace-cdn.com/content/v1/6242a4fbf1bd754241cb482c/a438da7c-b357-4d62-afbc-7d02389a890a/0003+INDIAN+WEDDING+PHOTOGRAPHY+BALI+DAN_3861_.jpg',

      cel1:        'https://thumbs.dreamstime.com/b/marigold-flower-decorations-royal-wedding-mehrangarh-fort-jodhpur-rajasthan-india-marigold-flower-decorations-250346963.jpg',
      cel3:        'https://i.pinimg.com/originals/fb/a1/c5/fba1c515c75f42ead34f91df1c4f0051.jpg',
      gal_bride:   'https://thumbs.dreamstime.com/b/portrait-beautiful-indian-bride-22405635.jpg',
      gal_pheras:  'https://i0.wp.com/myold-2c8e1b99-3f8d-49d6-b62f-41b6b7764b1f.s3.amazonaws.com/wp-content/uploads/2019/04/28180747/Indian-Traditions39-Ceremony-506-Christopher-Brock-Photography.jpg?fit=1000,667&ssl=1',

    /* ─── SCROLL PROGRESS ───────────────────────────────────────── */
    function ScrollProgress() {
      const [w, setW] = useState(0);
      useEffect(() => {
        const upd = () => {
          const el = document.documentElement;
          const sh = el.scrollHeight - el.clientHeight;
          setW(sh > 0 ? ((el.scrollTop || document.body.scrollTop) / sh) * 100 : 0);
        };
        window.addEventListener('scroll', upd, { passive: true });
        return () => window.removeEventListener('scroll', upd);
      }, []);
      return <div className="scroll-progress" style={{ width: `${w}%` }} aria-hidden="true" />;
    }

    /* ─── CUSTOM CURSOR ─────────────────────────────────────────── */
    function CustomCursor() {
      const dotRef = useRef(null);
      const ringRef = useRef(null);
      useEffect(() => {
        if (window.matchMedia('(pointer: coarse)').matches) return;
        let mx=-100,my=-100,rx=-100,ry=-100,raf,hovering=false;
        const mv = e => { mx=e.clientX; my=e.clientY; dotRef.current?.classList.remove('cursor-hidden'); ringRef.current?.classList.remove('cursor-hidden'); };
        const ml = () => { dotRef.current?.classList.add('cursor-hidden'); ringRef.current?.classList.add('cursor-hidden'); };
        const me = () => { dotRef.current?.classList.remove('cursor-hidden'); ringRef.current?.classList.remove('cursor-hidden'); };
        const po = e => {
          const t = e.target?.closest("a,button,[role='button'],input,textarea,select,label,[data-cursor-hover]");
          if (t && !hovering) { hovering=true; ringRef.current?.classList.add('cursor-hover'); }
          else if (!t && hovering) { hovering=false; ringRef.current?.classList.remove('cursor-hover'); }
        };
        const anim = () => {
          rx += (mx-rx)*.1; ry += (my-ry)*.1;
          if (dotRef.current) dotRef.current.style.transform=`translate(${mx}px,${my}px)`;
          if (ringRef.current) ringRef.current.style.transform=`translate(${rx}px,${ry}px)`;
          raf = requestAnimationFrame(anim);
        };
        document.addEventListener('mousemove',mv); document.addEventListener('mouseleave',ml);
        document.addEventListener('mouseenter',me); document.addEventListener('pointerover',po);
        raf = requestAnimationFrame(anim);
        return () => { document.removeEventListener('mousemove',mv); document.removeEventListener('mouseleave',ml); document.removeEventListener('mouseenter',me); document.removeEventListener('pointerover',po); cancelAnimationFrame(raf); };
      },[]);
      return (<><div ref={dotRef} className="cursor-dot cursor-hidden" aria-hidden="true"/><div ref={ringRef} className="cursor-ring cursor-hidden" aria-hidden="true"/></>);
    }

    /* ─── INTRO ─────────────────────────────────────────────────── */
    function Intro() {
      const [vis, setVis] = useState(true);
      useEffect(() => { const t = setTimeout(()=>setVis(false),2600); return()=>clearTimeout(t); },[]);
      return (
        <AnimatePresence>

            <motion.div initial={{y:0}} exit={{y:'-100%'}} transition={{duration:.85,ease:[.76,0,.24,1],delay:.1}}
              style={{position:'fixed',inset:0,zIndex:99999,background:'#0a0804',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}} aria-hidden="true">

                style={{display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
                <div style={{display:'flex',alignItems:'center',gap:12}}>
                  <span style={{fontSize:11,letterSpacing:'.45em',textTransform:'uppercase',color:'rgba(255,255,255,.4)',fontFamily:'DM Sans,sans-serif',fontWeight:300}}>Est. 2009</span>
                  <span style={{width:40,height:.5,background:'rgba(201,168,76,.4)',display:'inline-block'}}/>
                  <span style={{fontSize:11,letterSpacing:'.45em',textTransform:'uppercase',color:'rgba(255,255,255,.4)',fontFamily:'DM Sans,sans-serif',fontWeight:300}}>Mumbai</span>
                </div>
                <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:300,fontSize:'clamp(2.5rem,6vw,4rem)',letterSpacing:'.18em',color:'#fff',textTransform:'uppercase'}}>Trio Events</h1>
                <motion.div initial={{scaleX:0}} animate={{scaleX:1}} transition={{duration:.8,ease:'easeOut',delay:.9}}
                  style={{width:80,height:1,background:'#C9A84C',transformOrigin:'left'}}/>
                <motion.p initial={{opacity:0}} animate={{opacity:.5}} transition={{duration:.6,delay:1.3}}
                  style={{fontSize:10,letterSpacing:'.5em',textTransform:'uppercase',color:'rgba(255,255,255,.5)',fontFamily:'DM Sans,sans-serif'}}>
                  Curators of the Extraordinary
                </motion.p>
              </motion.div>
            </motion.div>
          )}
        </AnimatePresence>
      );
    }

    /* ─── WHATSAPP BUTTON ───────────────────────────────────────── */
    function WhatsAppButton() {
      return (
        <motion.a href="https://wa.me/919820000000?text=Hello%20Trio%20Events%2C%20I%20am%20interested%20in%20planning%20my%20destination%20wedding."
          target="_blank" rel="noopener noreferrer"
          initial={{scale:0,opacity:0}} animate={{scale:1,opacity:1}} transition={{duration:.5,delay:3,ease:'easeOut'}}
          whileHover={{scale:1.08}} whileTap={{scale:.95}}
          data-cursor-hover aria-label="Chat on WhatsApp"
          style={{position:'fixed',bottom:28,right:28,zIndex:9990,width:52,height:52,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#25D366,#128C7E)',boxShadow:'0 4px 24px rgba(37,211,102,.4)'}}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

    /* ─── MARQUEE ────────────────────────────────────────────────── */
    const MARQUEE_ITEMS = ['Royal Palaces of Rajasthan','Tuscan Villa Estates','Dubai Skyline Celebrations','Bali Temple Ceremonies','Lake Como Elegance','Goa Shores at Sunset','Santorini Caldera Views','Paris Grandeur','Maldives Island Nuptials','Jaipur Heritage Mandaps'];
    function Marquee({ dark=false }) {
      const txt = MARQUEE_ITEMS.flatMap(i=>[i,'✦']).join('  ');

    /* ─── NAVBAR ─────────────────────────────────────────────────── */
    const NAV_LINKS = [{name:'Destinations',href:'#portfolio'},{name:'Experiences',href:'#celebrations'},{name:'Gallery',href:'#gallery'},{name:'The Journey',href:'#journey'},{name:'About',href:'#about'}];

    function Navbar() {
      const [scrolled,setScrolled] = useState(false);
      const [open,setOpen] = useState(false);
      useEffect(()=>{ const h=()=>setScrolled(window.scrollY>60); window.addEventListener('scroll',h,{passive:true}); return()=>window.removeEventListener('scroll',h); },[]);

    /* ─── HERO ───────────────────────────────────────────────────── */

      {name:'Dubai',     desc:'Skyline grandeur meets Indian tradition', img:IMG.dubai},
      {name:'Bali',      desc:'Tropical mandap ceremonies in paradise', img:IMG.bali},
      {name:'Lake Como', desc:'Lakeside celebrations in northern Italy', img:IMG.como},
      {name:'Goa',       desc:'Barefoot beach weddings at sunset', img:IMG.goa},
    ];
    const sc = { hidden:{}, visible:{transition:{staggerChildren:.12,delayChildren:2.8}} };
    const lr = { hidden:{y:'100%',opacity:0}, visible:{y:0,opacity:1,transition:{duration:.9,ease:[.33,1,.68,1]}} };

    function Hero() {
      return (
        <section style={{position:'relative',width:'100%',minHeight:'100dvh',display:'flex',overflow:'hidden',background:'#000'}}>
          {/* LEFT */}
          <div style={{position:'relative',width:'60%',minHeight:'100dvh',flexShrink:0,display:'flex',flexDirection:'column'}}>
            <img src={IMG.hero} alt="Luxury Indian Destination Wedding" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',objectPosition:'center'}}/>
            <div style={{position:'absolute',inset:0,background:'linear-gradient(to right,rgba(0,0,0,.8),rgba(0,0,0,.5),rgba(0,0,0,.15))'}}/>

    function useCountUp(target, inView, dur=2200) {
      const [c,setC]=useState(0);
      useEffect(()=>{
        if(!inView) return;
        const st=Date.now();
        const t=setInterval(()=>{
          const e=Date.now()-st; const p=Math.min(e/dur,1); const ea=1-Math.pow(1-p,3);
          setC(Math.round(ea*target)); if(p>=1) clearInterval(t);
        },16);
        return()=>clearInterval(t);
      },[inView,target,dur]);
      return c;
    }
